name: task_flow
description: "A production-ready Task Management & Productivity App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP / API
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.3.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # UI / Utils
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  iconsax: ^0.0.8
  gap: ^3.0.1

  # Date Picker
  table_calendar: ^3.1.2

  # UUID
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  mockito: ^5.4.4

flutter:
  uses-material-design: true
